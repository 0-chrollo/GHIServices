<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thee Fellars</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Lato:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --top-bg:    #1b4a1c;
    --nav-bg:    #f5f3ee;
    --menu-1:    #2d6b2e;
    --menu-2:    #255224;
    --accent:    #a8c832;
    --btn-bg:    #8ab825;
    --nav-height: 58px;
    --top-height: 70px;
    --logo-size:  46px;
  }

  body {
    font-family: 'Lato', sans-serif;
    background: #1a3a1a;
    min-height: 200vh;
  }

  /* TOP BAR */
  .top-bar {
    background: linear-gradient(135deg, rgb(205, 205, 205) 0%, rgb(255, 255, 255));
    height: var(--top-height);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .logo-wrap img {
    width:3.5rem;
  
    object-fit: contain;
    display: block;
    border-radius: 6px;
    flex-shrink: 0;
  }

  .brand-name {
    font-family: Georgia;
    font-size: 15px;
    font-weight: 900;
    color: rgb(12, 61, 33);
    letter-spacing: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .get-quote-btn {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, rgb(20, 75, 44) 0%, rgb(4, 52, 25));
    border: 2px solid #5a7a10;
    border-radius: 28px;
    padding: 9px 18px;
    cursor: pointer;
    white-space: nowrap;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.15s;
  }

  .get-quote-btn:hover { background: #0b1002; transform: scale(1.03); }

  /* NAV BAR */
  .nav-bar {
    background: linear-gradient(135deg, rgb(20, 75, 44) 0%, rgb(4, 52, 25));
    height: var(--nav-height);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 999;
    border-bottom: 1px solid #ccc9be;
    /* dropdown is positioned relative to this */
  }

  .socials {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .social-link {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid #efefef;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    text-decoration: none;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .social-link:hover {
    border-color: #3a7a1a;
    color: #3a7a1a;
    background: rgba(80,130,20,0.08);
  }

  .social-link svg {
    width: 13px;
    height: 13px;
    fill: currentColor;
  }

  /* DESKTOP NAV LINKS */
  .desktop-nav {
    display: none;
    align-items: center;
    gap: 0;
    list-style: none;
  }

  .desktop-nav li a {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    text-decoration: none;
    color: #3a4a2a;
    padding: 0 16px;
    height: var(--nav-height);
    display: flex;
    align-items: center;
    position: relative;
    transition: color 0.2s;
  }

  .desktop-nav li a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 16px;
    right: 16px;
    height: 3px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    transform: scaleX(0);
    transition: transform 0.22s cubic-bezier(.4,0,.2,1);
  }

  .desktop-nav li a:hover { color: #1a6a1a; }
  .desktop-nav li a:hover::after { transform: scaleX(1); }

  /* BURGER (mobile only) */
  .burger {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 4px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    z-index: 1001;
  }

  .burger span {
    display: block;
    width: 22px;
    height: 2.5px;
    background: #e5e5e5;
 
    transition: transform 0.35s cubic-bezier(.4,0,.2,1), opacity 0.25s;
    transform-origin: center;
  }

  .burger:hover span { background: #c5c5c5; }

  .nav-bar.open .burger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .nav-bar.open .burger span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .nav-bar.open .burger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  /* MOBILE DROPDOWN — sits directly below the sticky nav */
  .dropdown-menu {
    position: absolute;
    top: var(--nav-height);
    left: 0;
    right: 0;
    z-index: 998;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.42s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .dropdown-menu.open { max-height: 420px; }

  .dropdown-menu ul { list-style: none; }

  .dropdown-menu ul li a {
    display: flex;
    align-items: center;
    padding: 15px 24px;
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    text-decoration: none;
    border-bottom: 1px solid rgba(0,0,0,0.14);
    transition: background 0.15s, padding-left 0.2s, color 0.15s;
  }

  .dropdown-menu ul li:nth-child(1) a { background: rgb(216, 216, 216); color:#082a06; }
  .dropdown-menu ul li:nth-child(n+2) a { background: linear-gradient(135deg, rgb(205, 205, 205) 0%, rgb(255, 255, 255)); color: #061b04; }
  .dropdown-menu ul li:last-child a { border-bottom: none; }

  .dropdown-menu ul li a:hover {
    background: #1c4020;
    padding-left: 34px;
    color: var(--accent);
  }

  /* HERO PLACEHOLDER */
  .hero-placeholder {
    background: #1a3a1c;
    min-height: 500px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.13);
    font-family: 'Oswald', sans-serif;
    letter-spacing: 4px;
    font-size: 13px;
    text-transform: uppercase;
  }

  /* DESKTOP: show inline nav, hide burger + dropdown */
  @media (min-width: 768px) {
    .desktop-nav { display: flex; }
    .burger { display: none; }
    .dropdown-menu { display: none; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="brand">
    <div class="logo-wrap">
      <img id="logoImg"
        src="crelog2.png"
        alt="Thee Fellars Logo">
    </div>
    <span class="brand-name">GHI Services</span>
  </div>
  <a href="#" class="get-quote-btn">Get Quote</a>
</div>

<!-- NAV BAR -->
<nav class="nav-bar" id="navBar">
  <div class="socials">
    <a href="#" class="social-link" aria-label="Facebook">
      <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
    </a>
    <a href="#" class="social-link" aria-label="Twitter">
      <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
    </a>
    <a href="#" class="social-link" aria-label="Instagram">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
    </a>
  </div>

  <!-- Desktop inline nav -->
  <ul class="desktop-nav">
    <li><a href="#">Home</a></li>
    <li><a href="#">About Us</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Gallery</a></li>
    <li><a href="#">Contact</a></li>
  </ul>

  <!-- Mobile burger -->
  <button class="burger" id="burger" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <!-- MOBILE DROPDOWN MENU — inside nav so it sticks with it on scroll -->
  <div class="dropdown-menu" id="dropdownMenu" aria-hidden="true">
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Gallery</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </div>
</nav>

<!-- HERO PLACEHOLDER -->
<div class="hero-placeholder">← Your Hero Section Goes Here →</div>

<script>
  const burger = document.getElementById('burger');
  const navBar = document.getElementById('navBar');
  const menu   = document.getElementById('dropdownMenu');

  burger.addEventListener('click', () => {
    const isOpen = menu.classList.toggle('open');
    navBar.classList.toggle('open', isOpen);
    burger.setAttribute('aria-expanded', isOpen);
    menu.setAttribute('aria-hidden', !isOpen);
  });

  menu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      menu.classList.remove('open');
      navBar.classList.remove('open');
      burger.setAttribute('aria-expanded', 'false');
      menu.setAttribute('aria-hidden', 'true');
    });
  });
</script>
</body>
</html>
