<style>


    .main-hero {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #0a0a0a;
      overflow-x: hidden;
    }
  
    /* ── HERO WRAPPER ── */
    .meg-hero {
      position: relative;
      width: 100%;
      height: 4vh;

      min-height: 60px;
      overflow: hidden;
    }
  
    /* ── EACH SLIDE ── */
    .meg-slide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
  
    .meg-slide.active {
      opacity: 1;
      visibility: visible;
    }
  
    /* Background */
    .meg-slide-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
  
    /* Gradient overlay */
    .meg-slide-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.636) 0%,
        rgba(0, 0, 0, 0.548) 50%,
        rgba(0, 0, 0, 0.896) 100%
      );
    }
  
    /* Grain texture */
    .meg-slide-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
    }
  
    /* Ken Burns only on active slide */
    .meg-slide.active .meg-slide-bg {
      animation: slowZoom 14s ease-out forwards;
    }
  
    @keyframes slowZoom {
      from { transform: scale(1.07); }
      to   { transform: scale(1.0); }
    }
  
    /* ── SLIDE CONTENT ── */
    .meg-slide-content {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 0 5vw 1vh;
    }
  
 
    /* Headline */
    .meg-slide-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3vh;
      line-height: 0.92;
      color: #ffffff;
      letter-spacing: 0.01em;
      margin-bottom: 18px;
    }
  

  
    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .meg-counter { display: none; }
      .meg-slide-content { padding: 0 9vw 3.5px; }
      .meg-nav {
        bottom: 10px;
        right: 5vw;
      }
    }
  </style>

  <style>

    /* ── SCROLL WRAPPER ── */
    .breadcrumb-wrap {
      width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .breadcrumb-wrap::-webkit-scrollbar { display: none; }
  
    /* ── BREADCRUMB ── */
    .breadcrumb {
      display: flex;
      align-items: stretch;
      background: rgb(14, 73, 38);
      min-width: 100%;
      width: max-content;
    }
  
    .bc-item {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      padding: 14px 28px 14px 20px;
      position: relative;
      background: rgb(14, 73, 38);
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
      min-width: max-content;
    }
  
    /* right arrow */
    .bc-item::after {
      content: '';
      position: absolute;
      right: -14px;
      top: 0;
      width: 0;
      height: 0;
      border-top: 24px solid transparent;
      border-bottom: 24px solid transparent;
      border-left: 14px solid rgb(14, 73, 38);
      z-index: 2;
    }
  
    /* subtle separator outline */
    .bc-item::before {
      content: '';
      position: absolute;
      right: -16px;
      top: 0;
      width: 0;
      height: 0;
      border-top: 24px solid transparent;
      border-bottom: 24px solid transparent;
      border-left: 14px solid rgba(255,255,255,0.12);
      z-index: 1;
    }
  
    .bc-item:last-child::after,
    .bc-item:last-child::before {
      display: none;
    }
  
    /* active / current page */
    .bc-item.active {
      background: rgb(18, 120, 60);
      color: #fff;
      pointer-events: none;
    }
  
    .bc-item.active::after {
      border-left-color: rgb(18, 120, 60);
    }
  
    .bc-item:not(.active):hover {
      background: rgb(10, 54, 28);
      color: #fff;
    }
  
    .bc-item:not(.active):hover::after {
      border-left-color: rgb(10, 54, 28);
    }
  
    .bc-item i {
      font-size: 12px;
    }
  
    /* ── DEMO LAYOUT ── */
    .demo {
 
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
  

  </style>
